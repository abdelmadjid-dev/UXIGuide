<h2 mat-dialog-title class="dialog-title">
  <mat-icon class="dialog-title-icon">{{ isEditMode() ? 'edit' : 'add_circle' }}</mat-icon>
  {{ isEditMode() ? 'Edit Project' : 'Create New Project' }}
</h2>

<mat-dialog-content class="dialog-content">
  <!-- Project Name -->
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Project Name</mat-label>
    <input matInput [(ngModel)]="projectName" placeholder="e.g. My SaaS" id="project-name-input" />
  </mat-form-field>

  <!-- Whitelisted Domain -->
  <label class="domains-label">Whitelisted Domain</label>
  <p class="domains-hint">Enter the domain origin to allow WebSocket connections.</p>

  <mat-form-field appearance="outline" class="full-width domain-field">
    <mat-label>Domain</mat-label>
    <input matInput [(ngModel)]="domain" placeholder="e.g. mysaas.com" id="domain-input" />
    <mat-icon matSuffix>language</mat-icon>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-button (click)="onCancel()" id="cancel-btn">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSave()" [disabled]="isLoading() || !projectName.trim() || !domain.trim()"
    class="create-action-btn" id="save-btn">
    @if (isLoading()) {
    <mat-spinner diameter="20"></mat-spinner>
    } @else {
    {{ isEditMode() ? 'Save Changes' : 'Create Project' }}
    }
  </button>
</mat-dialog-actions>
