@if (isLoginPage()) {
<router-outlet />
} @else {
<div class="app-layout">
  <!-- Topbar Navigation -->
  <mat-toolbar class="topbar glass">
    <div class="topbar-left">
      <!-- Brand -->
      <div class="topbar-brand">
        <div class="topbar-logo">
          <img src="/logo-transparent.svg" alt="UXIGuide Logo" class="topbar-logo-img">
        </div>
        <span class="topbar-title">UXIGuide</span>

        <span class="version-badge">v0.2</span>
      </div>

      <!-- Horizontal Navigation -->
      <nav class="topbar-nav">
        @for (item of navItems; track item.route) {
        <a mat-button [routerLink]="item.route" routerLinkActive="active-link" class="nav-item"
          [id]="'nav-' + item.label.toLowerCase().replace(' ', '-')">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
        }
      </nav>
    </div>

    <div class="topbar-right">
      <!-- User Info & Global Actions -->
      <div class="user-pill" *ngIf="isAuthenticated()">
        <div class="user-avatar">{{ userInitial() }}</div>
        <span class="user-email">{{ userEmail() }}</span>
      </div>

      <button mat-icon-button (click)="toggleTheme()"
        [matTooltip]="themeService.currentTheme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        class="theme-toggle-btn" id="theme-toggle-btn">
        <mat-icon>{{ themeService.currentTheme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-icon-button (click)="logout()" matTooltip="Sign out" class="logout-btn" id="logout-btn">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-toolbar>

  <!-- Page Content Area -->
  <main class="main-content">
    <div class="page-content">
      <router-outlet />
    </div>
  </main>
</div>
}
